<style>
/* ════════════════════════════════════════════════════════════════
   DESIGN TOKENS  (aligned with ashanti-goldfields palette)
   ════════════════════════════════════════════════════════════════ */
:root {
  --serif  : "DM Serif Display", Georgia, serif;
  --sans   : "DM Sans", system-ui, sans-serif;
  --mono   : "JetBrains Mono", monospace;

  /* Brand colors */
  --teal   : #2d8b8b;  --teal-s : rgba(45,139,139,.13);  --teal-d : rgba(45,139,139,.07);
  --blue   : #4a9ebb;  --blue-s : rgba(74,158,187,.13);  --blue-d : rgba(74,158,187,.07);
  --amber  : #c99b45;  --amber-s: rgba(201,155,69,.13);  --amber-d: rgba(201,155,69,.07);
  --green  : #4caf7d;
  --red    : #e05c5c;
  --violet : #7c6fcd;

  /* Ink & surface */
  --ink    : rgba(241,250,238,.92);
  --ink2   : rgba(241,250,238,.62);
  --ink3   : rgba(241,250,238,.32);
  --bg     : #0a0f1a;
  --sur    : rgba(255,255,255,.04);
  --sur2   : rgba(255,255,255,.07);
  --brd    : rgba(255,255,255,.08);
  --div    : rgba(255,255,255,.05);

  /* Motion */
  --ease   : cubic-bezier(.16,1,.3,1);
  --ease-b : cubic-bezier(.34,1.56,.64,1);

  /* Spacing */
  --r      : 12px;
  --rx     : 18px;

  /* Javeriana accent */
  --jav    : #003366;
  --jav-g  : #c8a84b;
}

/* ── RESET ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: var(--sans); -webkit-font-smoothing: antialiased; }
body { background: var(--bg); color: var(--ink); }
h1, h2, h3 { font-family: var(--serif); line-height: 1.1; }
button { cursor: pointer; font: inherit; border: 0; background: none; color: inherit; }
.mono { font-family: var(--mono); }

/* ── TOPBAR ────────────────────────────────────────── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500; height: 52px;
  display: flex; align-items: center; gap: 1rem; padding: 0 1.25rem;
  background: rgba(8,12,20,.88); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,.07);
}
#progress-bar {
  position: absolute; bottom: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--teal), var(--blue), var(--amber));
  transition: width .55s var(--ease);
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 8px rgba(45,139,139,.5);
}
.tb-brand {
  font-family: var(--serif); font-size: .85rem; color: var(--ink3);
  display: flex; align-items: center; gap: .5rem; flex-shrink: 0;
}
.tb-line { width: 14px; height: 2px; background: var(--teal); border-radius: 2px; }
#tb-phases {
  display: flex; align-items: center; gap: 2px; flex: 1; justify-content: center; overflow: hidden;
}
.tb-phase {
  padding: .2rem .5rem; border-radius: 99px;
  font-family: var(--mono); font-size: .52rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
  color: var(--ink3); border: 1px solid transparent;
  transition: color .3s, background .3s, border-color .3s;
  white-space: nowrap; cursor: pointer;
}
.tb-phase.act { color: var(--teal); background: var(--teal-d); border-color: rgba(45,139,139,.3); }
.tb-counter { font-family: var(--mono); font-size: .68rem; color: var(--ink3); flex-shrink: 0; }

/* ── LOGO PUJ (top-right corner) ───────────────────────────────── */
#logo-puj {
  position: fixed; top: 10px; right: 1.25rem; z-index: 600;
  display: flex; align-items: center; gap: 6px;
  opacity: .8; transition: opacity .3s;
}
#logo-puj:hover { opacity: 1; }
#logo-puj img { height: 44px; width: auto; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5)); }

/* ── HOURGLASS TIMER ────────────────────────────────────────── */
#timer-wrap {
  position: fixed; bottom: 1.4rem; right: 1.4rem; z-index: 600;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
#timer-svg { width: 38px; height: 56px; transition: all .6s var(--ease); }
#timer-label {
  font-family: var(--mono); font-size: .48rem;
  color: var(--ink3); text-align: center; letter-spacing: .06em;
  text-transform: uppercase; max-width: 60px; line-height: 1.3;
}

/* ── NAV ARROWS ─────────────────────────────────────────────── */
.nav-arrow {
  position: fixed; top: 50%; z-index: 400; transform: translateY(-50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(10,15,26,.8); backdrop-filter: blur(12px);
  border: 1px solid rgba(168,218,220,.15); color: var(--ink2);
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; opacity: 1;
}
.nav-arrow:hover { background: var(--teal); color: #fff; border-color: var(--teal); transform: translateY(-50%) scale(1.1); box-shadow: 0 8px 28px rgba(45,139,139,.4); }
.nav-arrow.off { opacity: 0; pointer-events: none; }
#nav-prev { left: 1rem; }
#nav-next { right: 1rem; }

/* ── KEYHINT ────────────────────────────────────────────────── */
#keyhint {
  position: fixed; bottom: 1.4rem; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: .4rem;
  font-family: var(--mono); font-size: .56rem; color: var(--ink3);
  z-index: 400; animation: fadeOut 1s 4s ease forwards;
}
.keybadge {
  padding: .18rem .35rem; background: var(--sur); border: 1px solid var(--brd);
  border-radius: 4px; font-size: .62rem;
}
@keyframes fadeOut { to { opacity: 0; pointer-events: none; } }

/* ── SLIDE ENTRY ANIMATIONS ────────────────────────────────────── */
@keyframes anim-up   { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:none} }
@keyframes anim-right{ from{opacity:0;transform:translateX(28px)} to{opacity:1;transform:none} }
@keyframes anim-pop  { 0%{opacity:0;transform:scale(.88)} 70%{transform:scale(1.04)} 100%{opacity:1;transform:scale(1)} }
@keyframes anim-glow-amber{ 0%,100%{box-shadow:0 0 0 rgba(201,155,69,0)} 50%{box-shadow:0 0 28px rgba(201,155,69,.55),0 0 6px rgba(201,155,69,.3)} }
@keyframes anim-glow-teal { 0%,100%{box-shadow:0 0 0 rgba(45,139,139,0)}  50%{box-shadow:0 0 24px rgba(45,139,139,.5)} }
@keyframes anim-bar  { from{width:0} to{width:var(--bar-w)} }
@keyframes anim-count{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.anim-up    { opacity:0; animation: anim-up    .55s var(--ease) forwards; }
.anim-right { opacity:0; animation: anim-right .5s  var(--ease) forwards; }
.anim-pop   { opacity:0; animation: anim-pop   .6s  var(--ease) forwards; }
