<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="javGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a33;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="80" rx="4" fill="rgba(0,51,102,0.08)" stroke="rgba(0,51,102,0.2)" stroke-width="1"/>

  <!-- Cross/Dagger symbol -->
  <g transform="translate(25, 25)">
    <path d="M15 0 L15 30 M10 8 L20 8" stroke="#C8A84B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <circle cx="15" cy="25" r="2" fill="#C8A84B"/>
  </g>

  <!-- University Name -->
  <text x="48" y="20" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#003366" letter-spacing="0.5">PONTIFICIA</text>
  <text x="48" y="38" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#003366" letter-spacing="0.5">UNIVERSIDAD</text>
  <text x="48" y="56" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#003366" letter-spacing="0.5">JAVERIANA</text>

  <!-- Decorative line -->
  <line x1="48" y1="62" x2="200" y2="62" stroke="#C8A84B" stroke-width="1" opacity="0.5"/>
</svg>